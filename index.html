<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/2.0.4/socket.io.js"></script>
    <!-- <link rel="stylesheet" type="text/css" href="/styles.css" /> -->
    <style>
        :root
        {
            --bgColor: #1c1c1c;
            --textColor: #fff;
            --1stColor: #FEE0A5;
            --2ndColor: #DADADA;
            --3rdColor: #E5B798;
            --4thColor: #474747;
            --pursuitPink: #d85a9f;
            --pursuitYellow: #ff8234;
            --pursuitDarkPink: #881c4b;
            --pursuitDarkYellow: #c67d08;
        }

        @font-face 
        {
            font-family: "Roboto Condensed", sans-serif;
            src: url(https://fonts.googleapis.com/css2?family=Roboto+Condensed:ital,wght@0,100..900;1,100..900&display=swap);
        }

        html
        {
            background-color: var(--bgColor);
        }

        h1
        {
            font-family: "Roboto Condensed", sans-serif;
            font-size: 2em;
            color: var(--textColor);
        }

        h2
        {
            font-family: "Roboto Condensed", sans-serif;
            font-size: 4em;
            margin: 8px 0;
            color: var(--textColor);
        }

        p
        {
            font-family: "Roboto Condensed", sans-serif;
            color: var(--textColor);
        }

        button
        {
            background-image: linear-gradient(345deg, var(--pursuitPink), var(--pursuitYellow), var(--pursuitPink));
            border: 2px solid var(--pursuitDarkPink);
            border-radius: 8px;
            color: var(--textColor);
            padding: 10px;
        }

        #title
        {
            display: flex;
            justify-content: center;
        }

        #controls
        {
            display: flex;
            justify-content: center;
        }

        #stopWatch
        {
            display: flex;
            justify-content: center;
            /* align-items: center; */
        }

        #race-container
        {
            /* border: 1px solid black; */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .race-position
        {
            grid-area: position;
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            font-size: 3em;
        }

        .racer-name
        {
            grid-area: racerName;
            font-size: 2em;
            margin: 5px 0 0 0;
        }

        .race-time
        {
            grid-area: time;
            font-size: 2em;
            margin: 0;
        }

        .lap-type
        {
            grid-area: type;
            margin: 0 0 0 5px;
        }

        .bike-card
        {
            display: none;
            grid-template-columns: repeat(2, 250px);
            grid-template-rows: auto;
            grid-template-areas: 
            "position racerName"
            "position time"
            "position type";
            background-color: gainsboro;
            margin: 5px;
            border-radius: 16px;
            animation-name: bike-card-anim;
            animation-duration: 1s;
        }

        .bike-card p
        {
            color: black;
        }

        #bike1
        {
            background-color: var(--1stColor);
        }
        #bike1 p
        {
            animation-name: bike-text-anim-black;
            animation-duration: 1s;
        }

        #bike2
        {
            background-color: var(--2ndColor);
        }

        #bike2 p
        {
            animation-name: bike-text-anim-black;
            animation-duration: 1s;
        }

        #bike3
        {
            background-color: var(--3rdColor);
        }

        #bike3 p
        {
            animation-name: bike-text-anim-black;
            animation-duration: 1s;
        }

        #bike4
        {
            background-color: var(--4thColor);
        }

        #bike4 p
        {
            color: var(--textColor);
            animation-name: bike-text-anim-white;
            animation-duration: 1s;
        }

        @keyframes bike-card-anim
        {
            0% {width: 0;}
            100% {width: 500px;}
        }

        @keyframes bike-text-anim-black
        {
            0% {color: transparent;}
            40% {color: transparent;}
            80%{color: var(--bgColor);}
        }
        @keyframes bike-text-anim-white
        {
            0% {color: transparent;}
            40% {color: transparent;}
            80%{color: var(--textColor);}
        }
    </style>
    <title>Lap Counter</title>
</head>
<body>
    <h1 id="title">Pursuit OCR - Pedal Bike Lap Counter</h1>

    <div id="controls">
        <button id="startBtn">Start Race</button>
    </div>

    <h2 id="stopWatch"></h2>

    <!-- <div id="sample"></div> -->

    <div id="race-container">
        <div class="bike-card" id="bike1">

        </div>
        <div class="bike-card" id="bike2">

        </div>
        <div class="bike-card" id="bike3">

        </div>
        <div class="bike-card" id="bike4">

        <!-- </div>
            <div class="bike-card" id="bike4">
            <p class="race-position">4th</p>
            <p class="racer-name">Alex</p>
            <p class="race-time">00:00:00</p>
            <p class="lap-type">Lap Type: Long</p>
        </div> -->
    </div>

    <!-- scripting -->
    <script>

        //socket variable
        var socket = io();

        //stopwatch variables
        var count = 0; //miliseconds
        var timer = false;

        var minutes = 0;
        var seconds = 0;
        var dSeconds = 0;

        var minDisp = "";
        var secDisp = "";
        var dSecDisp = "";

        var stopWatch = document.getElementById("stopWatch");
        var startBtn = document.getElementById("startBtn");

        //bike variables
        var bikes = [];

        var raceContainer = document.getElementById("race-container");
        var bikeCards = [document.getElementById("bike1"), document.getElementById("bike2"), document.getElementById("bike3"), document.getElementById("bike4"),]
        let lapComplete = false;
        //pole position variables
        //var sample = document.getElementById("sample");
        var currentPolePosition = 0;
        var polePositions = ["1st", "2nd", "3rd", "4th"];

        //setup all bikes
        for(var i = 0; i < 4; i++)
        {
            //create an object with the same properties for each existing bike
            bikes[i]= 
            {
                hexID: "",
                riderName: "",
                bikeTime: "",
                polePosition: "",
                lapCount: 0,
                lapType: "",
                setHTML: null
            }

            // fill in bike details based on which bike is being created
            if(i == 0)
            {
                bikes[i].hexID = "AE960E89";
                bikes[i].riderName = "Nathan";
            }
            else if(i == 1)
            {
                bikes[i].hexID = "D0C119A8";
                bikes[i].riderName = "Kayden";
            }
            else if(i == 2)
            {
                bikes[i].hexID = "03D33AAA";
                bikes[i].riderName = "Alex";
            }
            else if(i == 3)
            {
                bikes[i].hexID = "EAA315B1";
                bikes[i].riderName = "David";
            }
            else
            {
                console.log("if you're reading this something has gone horribly wrong!");
            }
        }

        console.log(bikes);

        //stopWatch.innerHTML = "Time Elapsed: " + minutes.toString() +":"+ seconds.toString + ":" + dSeconds.toString;
        stopWatch.innerHTML = "00:00:00";        

        startBtn.onclick = startTimer;

        function startTimer()
        {
            if(timer === false)
            {
                startBtn.innerHTML = "Stop Race";
                console.log("Stopwatch On");
                timer = true;
            }
            else
            {
                startBtn.innerHTML = "Start Race";
                console.log("Stopwatch Off");
                timer = false;
            }
            
            raceTimer();
        }

        function raceTimer()
        {
            if (timer === true)
            {
                count++;
            }

            if (count == 100)
            {
                seconds += 1;
                count = 0;
            }
            
            if(seconds == 60)
            {
                minutes += 1;
                seconds = 0;
            }

            if(count < 10)
            {
                dSecDisp = "0" + count.toString();
            }
            else
            {
                dSecDisp = count.toString();
            }

            if(seconds < 10)
            {
                secDisp = "0" + seconds.toString();
            }
            else
            {
                secDisp = seconds.toString();
            }
            
            if(minutes < 10)
            {
                minDisp = "0" + minutes.toString();
            }
            else
            {
                minDisp = minutes.toString();
            }

            stopWatch.innerHTML = minDisp + ":" + secDisp + ":" + dSecDisp;
            setTimeout(raceTimer, 10);
        }

        socket.on("data", function(data)
        {
            if(timer === true && lapComplete == false)
            {
                //debug information
                var curMin = minDisp;
                var curSec = secDisp;
                var curdSec = dSecDisp;
                console.log(data);

                for(i = 0; i <= (bikes.length); i++)
                {
                    if(data == bikes[i].hexID)
                    {
                        bikes[i].bikeTime = curMin + ":" + curSec + ":" + curdSec;
                        bikes[i].polePosition = polePositions[currentPolePosition];
                        currentPolePosition += 1;
                        bikes[i].lapCount += 1;
                        //placeholder for lapType
                        
                        //raceContainer.innerHTML +=  "<div class=\"bike-card\" id=\"bike" + currentPolePosition + "\"><p class=\"race-position\">" + bikes[i].polePosition + "</p><p class=\"racer-name\">" + bikes[i].riderName + "</p><p class=\"race-time\">" + bikes[i].bikeTime + "</p><p class=\"lap-type\">Lap Type: Long</p></div>";
                        bikeCards[currentPolePosition - 1].innerHTML = "<p class=\"race-position\">" + bikes[i].polePosition + "</p><p class=\"racer-name\">" + bikes[i].riderName + "</p><p class=\"race-time\">" + bikes[i].bikeTime + "</p><p class=\"lap-type\">Lap Type: Long</p>";
                        let curBike = document.getElementById("bike" + currentPolePosition.toString());

                        curBike.style.display = "grid";

                        //sample.innerHTML += curMin + ":" + curSec + ":" + curdSec + " by " + bikes[i].riderName + " (" + bikes[i].polePosition + ")<br>";
                        console.log(currentPolePosition.toString());

                        if(currentPolePosition == 4)
                        {
                            console.log("reset after 5 seconds");
                            lapComplete = true;
                            setTimeout(resetTimer, 5000);
                        }
                        break;
                    }
                }
            }
        });

        function addStyle()
        {
            console.log("add style here");
        }

        function resetTimer()
        {
            currentPolePosition = 0;
            for(i = 0; i < bikes.length; i++)
            {
                bikeCards[i].innerHTML = "";
                bikeCards[i].style.display = "none";
            }
            lapComplete = false;
        }
    </script>
</body>
</html>
